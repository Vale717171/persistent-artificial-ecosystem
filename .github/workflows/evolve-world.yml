name: Evolve World

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: evolve-world
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Evolve world
        run: node scripts/simulate.js

      - name: Commit updated state
        run: |
          # Each changed tick is intentionally committed as a fossil layer.
          if git diff --quiet -- data/world.json; then
            echo "No world state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world.json
          git commit -m "chore: evolve ecosystem state"
          git pull --rebase origin main
          git push
